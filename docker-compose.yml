services:
  server:
    container_name: wos-backend
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    restart: unless-stopped
  client:
    container_name: wos-frontend
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
    ports:
      - "3002:3002"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    restart: unless-stopped
  postgres:
    image: postgres:15
    container_name: wos-postgres
    restart: always
    ports:
      - "5472:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./backend/.env
  minio:
    image: quay.io/minio/minio:latest
    container_name: wos-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - ./backend/.env

    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
volumes:
  postgres_data:
  minio_data:
