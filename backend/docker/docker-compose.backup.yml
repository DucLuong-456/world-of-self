services:
  server:
    container_name: wos-backend
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    ports:
      - '3001:3001'
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    restart: unless-stopped
  client:
    container_name: wos-frontend
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
    ports:
      - '3002:3002'
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
      - postgres
    restart: unless-stopped
  postgres:
    image: postgres:15
    container_name: wos-postgres
    restart: always
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    ports:
      - '$POSTGRES_HOST_PORT:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./backend/.env
volumes:
  postgres_data:
